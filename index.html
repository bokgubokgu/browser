<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복구복구 브라우저</title>
<style>
*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

body{
    background:#091523;
    color:#111827;
}

.screen{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:
        opacity 1.1s ease,
        background-color 1.6s ease,
        color 1s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

.visible{
    opacity:1;
    pointer-events:auto;
}

.center-wrap{
    width:100%;
    max-width:980px;
    padding:0 24px;
    text-align:center;
}

#start{
    background:#091523;
    color:#ffffff;
}

.start-title{
    font-size:64px;
    font-weight:900;
    letter-spacing:-2px;
    line-height:1.18;
    opacity:1;
    transform:translateY(0);
    transition:
        transform 0.95s cubic-bezier(.22,.8,.2,1),
        opacity 0.95s ease;
}

.start-title.moved{
    transform:translateY(-48px);
}

.form-area{
    margin-top:22px;
    opacity:0;
    transform:translateY(18px);
    transition:
        opacity 0.85s ease,
        transform 0.85s cubic-bezier(.22,.8,.2,1);
    pointer-events:none;
}

.form-area.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

#inputList{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.name-input{
    width:min(430px, 80vw);
    height:54px;
    padding:0 16px;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:#ffffff;
    font-size:18px;
    transition:border-color .25s ease, background .25s ease, box-shadow .25s ease;
}

.name-input::placeholder{
    color:rgba(255,255,255,0.42);
}

.name-input:focus{
    border-color:rgba(120,220,255,0.85);
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 0 4px rgba(95,200,255,0.08);
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
}

.ctrl-btn,
.confirm-btn{
    height:48px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform .18s ease, opacity .18s ease, background .2s ease;
}

.ctrl-btn:active,
.confirm-btn:active{
    transform:scale(0.97);
}

.ctrl-btn{
    width:48px;
    background:rgba(255,255,255,0.14);
    color:#ffffff;
    font-size:24px;
    font-weight:700;
}

.ctrl-btn:hover{
    background:rgba(255,255,255,0.2);
}

.confirm-btn{
    padding:0 22px;
    background:#ebeff4;
    color:#112038;
    font-size:16px;
    font-weight:800;
}

.confirm-btn:disabled{
    opacity:.35;
    cursor:default;
}

.message{
    min-height:18px;
    margin-top:10px;
    font-size:13px;
    color:#72ddff;
    letter-spacing:-0.2px;
}

#loading{
    background:#0b1827;
    color:#ffffff;
}

.loading-text{
    font-size:48px;
    font-weight:900;
    letter-spacing:-1.5px;
    opacity:0;
    transform:translateY(12px);
    transition:
        opacity .9s ease,
        transform .9s cubic-bezier(.22,.8,.2,1);
}

.loading-text.show{
    opacity:1;
    transform:translateY(0);
}

#welcome{
    background:#ffffff;
    color:#12203a;
}

.welcome-text{
    font-size:72px;
    font-weight:900;
    letter-spacing:-2.5px;
    color:#12203a;
    opacity:0;
    transform:translateY(18px);
    filter:blur(6px);
    transition:
        opacity 1s ease,
        transform 1s cubic-bezier(.22,.8,.2,1),
        filter 1s ease;
}

.welcome-text.show{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
}

.welcome-text.fade-out{
    opacity:0;
    transform:translateY(-12px);
    filter:blur(7px);
}

#main{
    background:#ffffff;
    color:#111827;
    align-items:flex-start;
    justify-content:flex-start;
}

.main-wrap{
    width:100%;
    height:100%;
    position:relative;
    opacity:0;
    transition:opacity 1s ease;
}

.main-wrap.show{
    opacity:1;
}

.search-header{
    position:absolute;
    left:50%;
    top:44%;
    transform:translate(-50%, -50%);
    width:min(760px, 90vw);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:
        top 0.8s cubic-bezier(.22,.8,.2,1),
        left 0.8s cubic-bezier(.22,.8,.2,1),
        transform 0.8s cubic-bezier(.22,.8,.2,1),
        width 0.8s cubic-bezier(.22,.8,.2,1),
        opacity 0.5s ease;
}

.search-header.searched{
    top:48px;
    left:50px;
    transform:none;
    width:calc(100% - 56px);
    flex-direction:row;
    align-items:flex-start;
    justify-content:flex-start;
    gap:16px;
}

.logo-img{
    display:block;
    margin:0 auto -14px;
    transform:translateY(10px);
    width:clamp(170px, 23vw, 280px);
    height:auto;
    flex-shrink:0;
    transition:
        width 0.8s cubic-bezier(.22,.8,.2,1),
        margin 0.8s cubic-bezier(.22,.8,.2,1),
        transform 0.8s cubic-bezier(.22,.8,.2,1);
}

.search-header.searched .logo-img{
    width:118px;
    margin:0;
    transform:none;
}

.search-line{
    width:100%;
    margin:0 auto;
    display:flex;
    align-items:stretch;
    transition:width 0.8s cubic-bezier(.22,.8,.2,1);
}

.search-header.searched .search-line{
    width:min(760px, calc(100vw - 210px));
    max-width:760px;
}

.search-input{
    flex:1;
    height:56px;
    padding:0 18px;
    border:1px solid #cfd6dd;
    border-right:none;
    border-radius:16px 0 0 16px;
    outline:none;
    background:#ffffff;
    color:#12203a;
    font-size:18px;
    transition:
        border-color .2s ease,
        box-shadow .2s ease,
        height 0.8s cubic-bezier(.22,.8,.2,1);
}

.search-input::placeholder{
    color:#9aa5b1;
}

.search-input:focus{
    border-color:#b9c3cf;
    box-shadow:0 0 0 4px rgba(20,32,58,0.06);
}

.search-btn{
    width:92px;
    height:56px;
    border:1px solid #223149;
    border-radius:0 16px 16px 0;
    background:#223149;
    color:#ffffff;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:
        background .2s ease,
        border-color .2s ease,
        transform .18s ease,
        height 0.8s cubic-bezier(.22,.8,.2,1);
}

.search-btn:hover{
    background:#2a3a53;
    border-color:#2a3a53;
}

.search-btn:active{
    transform:scale(0.98);
}

.results-area{
    position:absolute;
    top:160px;
    left:28px;
    right:28px;
    bottom:28px;
    overflow:auto;
    opacity:0;
    transform:translateX(-26px);
    transition:
        opacity 0.65s ease,
        transform 0.65s cubic-bezier(.22,.8,.2,1);
    pointer-events:none;
}

.results-area.show{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}

.result-card{
    width:min(760px, 100%);
    background:#ffffff;
    border:1px solid #e4e8ee;
    border-radius:18px;
    padding:22px 24px;
    margin-bottom:14px;
    box-shadow:0 10px 30px rgba(16,24,40,0.04);
    cursor:pointer;
    transition:
        transform .22s ease,
        box-shadow .22s ease,
        border-color .22s ease;
}

.result-card:hover{
    transform:translateX(4px);
    border-color:#d6dde6;
    box-shadow:0 14px 34px rgba(16,24,40,0.07);
}

.result-title{
    font-size:24px;
    font-weight:800;
    color:#16233d;
    margin-bottom:10px;
    letter-spacing:-0.5px;
}

.result-preview{
    font-size:14px;
    line-height:1.65;
    color:#7f8a99;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.detail-view{
    position:absolute;
    top:160px;
    left:28px;
    right:28px;
    bottom:28px;
    overflow:auto;
    opacity:0;
    transform:translateX(26px);
    transition:
        opacity 0.55s ease,
        transform 0.55s cubic-bezier(.22,.8,.2,1);
    pointer-events:none;
}

.detail-view.show{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
}

.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:none;
    background:transparent;
    color:#40506a;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:20px;
    padding:0;
}

.back-btn:hover{
    color:#1b2a45;
}

.detail-card{
    width:min(760px, 100%);
    background:#ffffff;
    border:1px solid #e4e8ee;
    border-radius:20px;
    padding:26px 28px 30px;
    box-shadow:0 10px 30px rgba(16,24,40,0.04);
}

.detail-title{
    font-size:34px;
    font-weight:900;
    color:#13203a;
    letter-spacing:-1px;
    margin-bottom:18px;
}

.detail-body{
    font-size:17px;
    line-height:1.9;
    color:#374151;
    white-space:pre-wrap;
}

.no-result{
    width:min(760px, 100%);
    padding:26px 4px;
    font-size:15px;
    color:#7f8a99;
}

@media (max-width:640px){
    .start-title{
        font-size:40px;
    }

    .loading-text{
        font-size:36px;
    }

    .welcome-text{
        font-size:46px;
    }

    .search-header{
        top:37%;
    }

    .search-header.searched{
        top:18px;
        left:16px;
        width:calc(100% - 32px);
        gap:10px;
    }

    .search-header.searched .logo-img{
        width:82px;
    }

    .search-header.searched .search-line{
        width:calc(100vw - 124px);
    }

    .logo-img{
        width:clamp(150px, 38vw, 220px);
    }

    .search-input,
    .search-btn{
        height:50px;
    }

    .search-input{
        font-size:16px;
    }

    .search-btn{
        width:78px;
        font-size:15px;
    }

    .results-area,
    .detail-view{
        left:16px;
        right:16px;
        top:86px;
        bottom:16px;
    }

    .result-title{
        font-size:20px;
    }

    .detail-title{
        font-size:28px;
    }

    .detail-card,
    .result-card{
        padding:20px;
    }
}
</style>
</head>
<body>

<div id="start" class="screen visible">
    <div class="center-wrap">
        <div id="startTitle" class="start-title">탐정님의 성함을 입력해주세요</div>

        <div id="formArea" class="form-area">
            <div id="inputList"></div>

            <div class="controls">
                <button class="ctrl-btn" type="button" onclick="addInput()">+</button>
                <button class="ctrl-btn" type="button" onclick="removeInput()">−</button>
                <button id="confirmBtn" class="confirm-btn" type="button" onclick="confirmNames()" disabled>확인</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>
</div>

<div id="loading" class="screen hidden">
    <div id="loadingText" class="loading-text">확인중...</div>
</div>

<div id="welcome" class="screen hidden">
    <div id="welcomeText" class="welcome-text">환영합니다, 탐정님</div>
</div>

<div id="main" class="screen hidden">
    <div id="mainWrap" class="main-wrap">
        <div id="searchHeader" class="search-header">
            <img src="logo.png" alt="복구복구 로고" class="logo-img">
            <div class="search-line">
                <input id="searchInput" class="search-input" type="text" placeholder="검색어를 입력해주세요.">
                <button id="searchBtn" class="search-btn" type="button">검색</button>
            </div>
        </div>

        <div id="resultsArea" class="results-area"></div>

        <div id="detailView" class="detail-view">
            <button id="backBtn" class="back-btn" type="button">← 뒤로가기</button>
            <div class="detail-card">
                <div id="detailTitle" class="detail-title"></div>
                <div id="detailBody" class="detail-body"></div>
            </div>
        </div>
    </div>
</div>

<script src="articles.js"></script>
<script src="script.js"></script>
</body>
</html>
