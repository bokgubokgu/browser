<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>복구복구 브라우저</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    font-family:Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    overflow:hidden;
}

body{
    background:#0a1420;
}

/* 공통 화면 */
.screen{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:opacity 1s ease, background-color 1.6s ease, color 1.2s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

.visible{
    opacity:1;
    pointer-events:auto;
}

.center-wrap{
    width:100%;
    max-width:980px;
    padding:0 24px;
    text-align:center;
}

/* 시작 화면 */
#start{
    background:#091523;
    color:#ffffff;
}

.start-title{
    font-size:56px;
    font-weight:800;
    letter-spacing:-1.5px;
    line-height:1.2;
    opacity:1;
    transform:translateY(0);
    transition:
        transform 0.9s cubic-bezier(.22,.8,.2,1),
        opacity 0.9s ease;
}

.start-title.moved{
    transform:translateY(-42px);
}

.form-area{
    margin-top:24px;
    opacity:0;
    transform:translateY(16px);
    transition:
        opacity 0.8s ease,
        transform 0.8s cubic-bezier(.22,.8,.2,1);
    pointer-events:none;
}

.form-area.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}

#inputList{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.name-input{
    width:min(420px, 78vw);
    height:52px;
    padding:0 16px;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:#ffffff;
    font-size:18px;
    transition:border-color .25s ease, background .25s ease, box-shadow .25s ease;
}

.name-input::placeholder{
    color:rgba(255,255,255,0.38);
}

.name-input:focus{
    border-color:rgba(120,220,255,0.9);
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 0 4px rgba(95,200,255,0.10);
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:4px;
}

.ctrl-btn,
.confirm-btn{
    height:48px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:transform .18s ease, opacity .18s ease, background .2s ease;
}

.ctrl-btn:active,
.confirm-btn:active{
    transform:scale(0.97);
}

.ctrl-btn{
    width:48px;
    font-size:24px;
    font-weight:700;
    background:rgba(255,255,255,0.14);
    color:#ffffff;
}

.ctrl-btn:hover{
    background:rgba(255,255,255,0.20);
}

.confirm-btn{
    padding:0 22px;
    font-size:16px;
    font-weight:700;
    background:#e9edf1;
    color:#0f1e2f;
}

.confirm-btn:disabled{
    opacity:.35;
    cursor:default;
}

.message{
    min-height:18px;
    margin-top:10px;
    font-size:13px;
    color:#70d8ff;
    letter-spacing:-0.2px;
}

/* 로딩 */
#loading{
    background:#0b1827;
    color:#ffffff;
}

.loading-text{
    font-size:44px;
    font-weight:800;
    letter-spacing:-1px;
    opacity:0;
    transform:translateY(10px);
    transition:opacity .8s ease, transform .8s ease;
}

.loading-text.show{
    opacity:1;
    transform:translateY(0);
}

/* 환영 */
#welcome{
    background:#ffffff;
    color:#13203a;
    transition:opacity 1.2s ease, background-color 1.6s ease;
}

.welcome-text{
    font-size:64px;
    font-weight:900;
    letter-spacing:-2px;
    color:#13203a;
    opacity:0;
    transform:translateY(18px);
    transition:
        opacity 1s ease,
        transform 1s cubic-bezier(.22,.8,.2,1),
        filter 1s ease;
}

.welcome-text.show{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
}

.welcome-text.fade-out{
    opacity:0;
    transform:translateY(-12px);
    filter:blur(6px);
}

/* 메인 */
#main{
    background:#ffffff;
    color:#111827;
}

.main-wrap{
    width:100%;
    max-width:980px;
    padding:0 24px;
    text-align:center;
    transform:translateY(-66px);
    opacity:0;
    transition:opacity 1s ease, transform 1s cubic-bezier(.22,.8,.2,1);
}

.main-wrap.show{
    opacity:1;
    transform:translateY(-86px);
}

.logo-img{
    display:block;
    margin:0 auto -20px;  /* 👈 이거 음수로 내려버리는 핵심 */
    width:clamp(170px, 23vw, 280px);
    height:auto;
}

.search-line{
    width:min(720px, 90vw);
    margin:0 auto;
    display:flex;
    align-items:stretch;
}

.search-input{
    flex:1;
    height:56px;
    padding:0 18px;
    border:1px solid #d0d5dc;
    border-right:none;
    border-radius:16px 0 0 16px;
    outline:none;
    background:#ffffff;   /* 하얀색 */
    color:#111;           /* 글씨 어둡게 */
    font-size:18px;
}

.search-input::placeholder{
    color:#9aa3af;
}

.search-input:focus{
    background:#434a53;
    border-color:#39404a;
    box-shadow:0 0 0 4px rgba(30,41,59,0.08);
}

.search-btn{
    width:90px;
    height:56px;
    border:1px solid #1f2a3a;
    border-radius:0 16px 16px 0;
    background:#1f2a3a;   /* 검푸른색 */
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:all .2s ease;
}

.search-btn:hover{
    background:#273447;
    border-color:#273447;
}

.search-btn:active{
    transform:scale(0.98);
}

@media (max-width:640px){
    .start-title{
        font-size:36px;
    }

    .loading-text{
        font-size:34px;
    }

    .welcome-text{
        font-size:42px;
    }

    .main-wrap.show{
        transform:translateY(-64px);
    }

    .search-input,
    .search-btn{
        height:50px;
    }

    .search-btn{
        width:74px;
        font-size:15px;
    }
}
</style>
</head>
<body>

<div id="start" class="screen visible">
    <div class="center-wrap">
        <div id="startTitle" class="start-title">탐정님의 성함을 입력해주세요</div>

        <div id="formArea" class="form-area">
            <div id="inputList"></div>

            <div class="controls">
                <button class="ctrl-btn" type="button" onclick="addInput()">+</button>
                <button class="ctrl-btn" type="button" onclick="removeInput()">−</button>
                <button id="confirmBtn" class="confirm-btn" type="button" onclick="confirmNames()" disabled>확인</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>
</div>

<div id="loading" class="screen hidden">
    <div id="loadingText" class="loading-text">확인중...</div>
</div>

<div id="welcome" class="screen hidden">
    <div id="welcomeText" class="welcome-text">환영합니다, 탐정님</div>
</div>

<div id="main" class="screen hidden">
    <div id="mainWrap" class="main-wrap">
        <img src="logo.png" alt="복구복구 로고" class="logo-img">
        <div class="search-line">
            <input class="search-input" type="text" placeholder="검색어를 입력해주세요.">
            <button class="search-btn" type="button">검색</button>
        </div>
    </div>
</div>

<script>
const start = document.getElementById("start");
const loading = document.getElementById("loading");
const welcome = document.getElementById("welcome");
const main = document.getElementById("main");

const startTitle = document.getElementById("startTitle");
const formArea = document.getElementById("formArea");
const inputList = document.getElementById("inputList");
const confirmBtn = document.getElementById("confirmBtn");
const message = document.getElementById("message");
const loadingText = document.getElementById("loadingText");
const welcomeText = document.getElementById("welcomeText");
const mainWrap = document.getElementById("mainWrap");

function showScreen(screen){
    [start, loading, welcome, main].forEach(s=>{
        s.classList.remove("visible");
        s.classList.add("hidden");
    });
    screen.classList.remove("hidden");
    screen.classList.add("visible");
}

function createInput(){
    const input = document.createElement("input");
    input.type = "text";
    input.className = "name-input";
    input.placeholder = "이름 입력";
    input.addEventListener("input", checkInputs);
    inputList.appendChild(input);
}

function addInput(){
    createInput();
    checkInputs();
}

function removeInput(){
    const inputs = inputList.querySelectorAll("input");
    if(inputs.length <= 1) return;
    inputList.removeChild(inputList.lastElementChild);
    checkInputs();
}

function checkInputs(){
    const inputs = inputList.querySelectorAll("input");
    let allFilled = inputs.length > 0;
    let allEmpty = true;

    inputs.forEach(input=>{
        const value = input.value.trim();
        if(value === ""){
            allFilled = false;
        }else{
            allEmpty = false;
        }
    });

    confirmBtn.disabled = !allFilled;
    message.textContent = allEmpty ? "이름을 입력해주세요." : "";
}

function confirmNames(){
    showScreen(loading);

    requestAnimationFrame(()=>{
        loadingText.classList.add("show");
    });

    setTimeout(()=>{
        loadingText.classList.remove("show");
        loading.style.backgroundColor = "#ffffff";

        setTimeout(()=>{
            showScreen(welcome);
            requestAnimationFrame(()=>{
                welcomeText.classList.add("show");
            });

            setTimeout(()=>{
                welcomeText.classList.add("fade-out");
            }, 3000);

            setTimeout(()=>{
                showScreen(main);
                requestAnimationFrame(()=>{
                    mainWrap.classList.add("show");
                });
            }, 4100);
        }, 700);
    }, 1600);
}

setTimeout(()=>{
    startTitle.classList.add("moved");
    formArea.classList.add("show");
    addInput();
}, 900);
</script>

</body>
</html>
